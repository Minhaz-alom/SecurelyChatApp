<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securely | Pro E2EE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
    
    <!-- CryptoJS for E2E Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <div id="username-page">
        <div class="glass-panel login-panel">
            <h1 class="logo">Securely</h1>
            <p class="subtitle">End-to-End Encrypted Communication</p>
            <form id="username-form" name="usernameForm">
                <div class="form-group">
                    <label for="name">Your Username</label>
                    <input type="text" id="name" placeholder="E.g. minhaz" autocomplete="off" required />
                </div>
                <!-- E2E Key Input -->
                <div class="form-group">
                    <label for="secret-key">Room Encryption Secret</label>
                    <input type="password" id="secret-key" placeholder="Enter shared secret key" autocomplete="off" required />
                    <small>Keep this safe. Anyone without this exact key will only see scrambled data.</small>
                </div>
                <div class="form-group">
                    <button type="submit" class="primary-btn">Unlock Securely</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 2-Pane Professional Layout -->
    <div id="chat-page" class="hidden">
        <div class="app-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2 class="logo-small">Securely</h2>
                    <div class="user-badge">
                        <span class="status-dot"></span>
                        <span id="current-user"></span>
                    </div>
                </div>

                <div class="sidebar-content">
                    <div class="section-title">CHANNELS</div>
                    <ul class="room-list" id="roomsArea">
                        <!-- Dynamic Rooms -->
                        <li class="room-item active" data-room-id="default"># general-encrypted</li>
                    </ul>

                    <div class="section-title">START NEW DIRECT CHAT</div>
                    <div class="new-chat-widget">
                        <select id="user-select" class="glass-input">
                            <option value="">Select a user...</option>
                        </select>
                        <button id="start-dm-btn" class="secondary-btn">+</button>
                    </div>
                </div>
                
                <button id="logout-btn" class="logout-btn">Log Out</button>
            </aside>

            <!-- Main Chat Area -->
            <main class="chat-main">
                <header class="chat-header">
                    <div class="chat-title">
                        <span class="room-hash">#</span> 
                        <span id="active-room-name">general-encrypted</span>
                    </div>
                    <div class="e2e-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <span>E2E Encrypted</span>
                    </div>
                </header>
                
                <div class="chat-messages" id="messageArea">
                    <!-- Messages will be injected here via JS -->
                </div>
                
                <footer class="chat-footer">
                    <form id="message-form" name="messageForm" class="message-form">
                        <div class="input-group">
                            <input type="text" id="message" placeholder="Message #general-encrypted" autocomplete="off" class="glass-input"/>
                            <button type="submit" class="send-btn">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </form>
                </footer>
            </main>
        </div>
    </div>

    <!-- Configuration for API calls to backend -->
    <script>
        // Set your backend URL here. For Render/Railway use HTTPS. 
        // For local development use http://localhost:8080.
        // If empty, falls back to local.
        window.SECURELY_BACKEND_URL = "http://localhost:8080"; 
    </script>
    <script src="./js/main.js"></script>
</body>
</html>
