<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securely | Real-time Java + Supabase Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <div id="username-page">
        <div class="glass-panel login-panel">
            <h1 class="logo">Securely</h1>
            <p class="subtitle">Join the real-time conversation.</p>
            <form id="username-form" name="usernameForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Enter your username" autocomplete="off" required />
                </div>
                <div class="form-group">
                    <button type="submit" class="primary-btn">Start Chatting</button>
                </div>
            </form>
        </div>
    </div>

    <div id="chat-page" class="hidden">
        <div class="glass-panel chat-container">
            <div class="chat-header">
                <div class="logo-small">Securely</div>
                <div class="user-status">
                    <div class="status-indicator online"></div>
                    <span id="current-user"></span>
                </div>
            </div>
            
            <div class="chat-messages glass-inner" id="messageArea">
                <!-- Messages will be injected here via JS -->
            </div>
            
            <form id="message-form" name="messageForm" class="message-form">
                <div class="input-group">
                    <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="glass-input"/>
                    <button type="submit" class="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- SockJS and STOMP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
